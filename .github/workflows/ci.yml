name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Rodar lint
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      
      - name: Rodar testes
        run: python -m pytest tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Construir imagem Docker
        run: |
          docker build -t minha-app-python:${{ github.sha }} .
          docker tag minha-app-python:${{ github.sha }} minha-app-python:latest
      
      - name: Listar imagens
        run: docker images | grep minha-app-python
      
      - name: Testar container
        run: |
          docker run --rm minha-app-python:latest python -c "from src.main import soma; assert soma(2,3) == 5; print('✅ Container funcionando!')"
      
      - name: Salvar imagem como artefato
        run: |
          docker save minha-app-python:latest -o minha-app-python.tar
      
      - name: Upload do artefato
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: minha-app-python.tar
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Download artefato
        uses: actions/download-artifact@v4
        with:
          name: docker-image
      
      - name: Carregar imagem Docker
        run: docker load -i minha-app-python.tar
      
      - name: Simular deploy com Docker
        run: |
          echo "🚀 Iniciando deployment da imagem Docker..."
          echo "📦 Imagem: minha-app-python:latest"
          echo "✅ Container pronto para execução!"
          echo ""
          echo "Comandos para executar localmente:"
          echo "docker run --rm minha-app-python:latest"
